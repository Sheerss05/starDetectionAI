# ─────────────────────────────────────────────────────────────
# Constellation Dataset — YOLOv8 format
#
# Directory structure (place your files here):
#
#   constellation_dataset/
#     images/
#       train/  ← copy images from your  train/  folder here
#       val/    ← copy images from your  valid/  folder here
#       test/   ← copy images from your  test/   folder here
#     labels/
#       train/  ← auto-generated YOLO .txt labels (run: python main.py convert)
#       val/
#       test/
#     annotations/
#       train.json  ← copy JSON from your  train/  folder here
#       val.json    ← copy JSON from your  valid/  folder here
#       test.json   ← copy JSON from your  test/   folder here
# ─────────────────────────────────────────────────────────────

path:  data/constellation_dataset   # dataset root (update to absolute path if needed)
train: images/train
val:   images/val
test:  images/test

# NOTE: YOLO automatically infers label file paths by replacing 'images' with
# 'labels' in each image path.  Labels must be at:
#   data/constellation_dataset/labels/{train,val,test}/*.txt
# See README or run:  python main.py convert --direction coco2yolo ...

nc: 88   # number of constellation classes

names:
  - Ori    # 0  Orion
  - UMa    # 1  Ursa Major
  - UMi    # 2  Ursa Minor
